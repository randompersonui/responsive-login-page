<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Login Page</title>


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="style.css">

</head>


<body>


    <main class="container">


        <img src="images/user.png" class="user-img" alt="User Icon">


        <h2>Welcome Back</h2>

        <p class="subtitle">
            Login to your account
        </p>



        <form class="card">


            <label for="username">
                Username
            </label>

            <input 
                type="text"
                id="username"
                placeholder="Enter username"
                required>



            <label for="password">
                Password
            </label>


            <input 
                type="password"
                id="password"
                placeholder="Enter password"
                required>



            <div class="options">


                <label class="remember">

                    <input type="checkbox">

                    Remember me

                </label>



                <a href="#">
                    Forgot Password?
                </a>


            </div>



            <button type="submit">
                Login
            </button>


        </form>



        <p class="signup">

            Don't have an account?

            <a href="#">
                Sign Up
            </a>

        </p>


    </main>


</body>

</html>
